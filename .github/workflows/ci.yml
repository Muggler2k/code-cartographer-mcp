name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22" # >= 22.5 for the built-in node:sqlite graph index (ADR 0023)
          cache: npm

      # The Roslyn sidecar targets net10.0 — pin the SDK so the C#/VB tier builds deterministically
      # regardless of the runner image's default SDK.
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # `npm ci` requires a platform-complete lockfile, but package-lock.json is generated on the
      # Windows-primary dev toolchain and omits optional transitive deps that Linux needs (e.g.
      # @emnapi/core / @emnapi/runtime via web-tree-sitter's wasm runtime) — npm does not produce
      # cross-platform-complete locks. `npm install` reconciles those optional deps at install time
      # while still honoring every locked version present (the lock stays authoritative on Windows,
      # where `npm ci` is used). See ci.yml history / PR #19.
      - run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Pre-build the Roslyn sidecar ONCE (with the pinned SDK above) so the parallel vitest workers
      # reuse the built dll instead of each racing `dotnet build` on shared bin/obj MSBuild locks —
      # the cause of intermittent csharpProvider/vb sidecar test failures.
      - name: Pre-build the Roslyn sidecar (deterministic C#/VB tests)
        run: dotnet build -c Release --nologo tools/roslyn-analyzer

      - name: Test
        run: npm test
        # Opt into the 1000-file 'large' cold-start scaling gate (ADR 0034 S4) — it generates +
        # builds a synthetic repo in a subprocess, so it's CI-only to keep the local loop fast.
        env:
          CCM_COLDSTART_LARGE: "1"

      - name: Slop gate (no disabled tests / type suppressions / tautologies)
        run: npm run slop
