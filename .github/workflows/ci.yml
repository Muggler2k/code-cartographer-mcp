name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22" # >= 22.5 for the built-in node:sqlite graph index (ADR 0023)
          cache: npm

      # package-lock.json is generated by npm 11 (the dev toolchain); node 22 ships npm ~10.9,
      # which resolves optional transitive deps (e.g. @emnapi/core via web-tree-sitter's wasm
      # runtime) differently and rejects the lock under `npm ci`. Pin npm to the lockfile's major
      # so CI consumes the lock with the same resolver that produced it.
      - name: Align npm with the lockfile generator
        run: npm install -g npm@11

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Slop gate (no disabled tests / type suppressions / tautologies)
        run: npm run slop
